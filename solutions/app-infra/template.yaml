  ApiApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${ApiApiGateway}/${ApiStageName}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  ApiHealthcheckLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/HealthcheckLambdaLogGroup"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  ApiHealthcheckLambda:
    Type: AWS::Serverless::Function
    Properties:
      DeploymentPreference:
        Alarms:
          - !Ref ApiHealthcheckLambdaErrorsAlarm
          - !Ref ApiHealthcheckLambdaThrottlesAlarm
      LoggingConfig:
        LogGroup: !Ref ApiHealthcheckLambdaLogGroup
      Handler: healthcheck.handler
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
      # These events are only necessary for running locally using the SAM CLI.
      # When CloudFormation executes this template these events are ignored
      # and the DefinitionBody on the API Gateways takes precedence.
      Events:
        Healthcheck:
          Type: Api
          Properties:
            RestApiId: !Ref ApiApiGateway
            Path: /healthcheck
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2024"
        Sourcemap: true
        EntryPoints:
          - solutions/api/src/lambda/healthcheck.ts

  ApiTokenLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/TokenLambdaLogGroup"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  ApiTokenLambda:
    Type: AWS::Serverless::Function
    Properties:
      DeploymentPreference:
        Alarms:
          - !Ref ApiTokenLambdaErrorsAlarm
          - !Ref ApiTokenLambdaThrottlesAlarm
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      LoggingConfig:
        LogGroup: !Ref ApiTokenLambdaLogGroup
      Handler: index.handler
      Environment:
        Variables:
          AUTH_TABLE_NAME: !Ref AuthCodeTable
          REPLAY_ATTACK_TABLE_NAME: !Ref ReplayAttackTable
          JWT_SIGNING_KEY_ALIAS: !Ref JWTSigningKeyAlias
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt ReplayAttackTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:DeleteItem
              Resource: !GetAtt AuthCodeTable.Arn
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt DynamoDbSSEKey.Arn
            - Effect: Allow
              Action:
                - kms:DescribeKey
                - kms:Sign
              Resource: !GetAtt JWTSigningKey.Arn
            - Effect: Allow
              Action:
                - appconfig:GetLatestConfiguration
                - appconfig:StartConfigurationSession
              Resource: !Sub arn:aws:appconfig:${AWS::Region}:${AWS::AccountId}:application/*
      # These events are only necessary for running locally using the SAM CLI.
      # When CloudFormation executes this template these events are ignored
      # and the DefinitionBody on the API Gateways takes precedence.
      Events:
        Token:
          Type: Api
          Properties:
            RestApiId: !Ref ApiApiGateway
            Path: /token
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: "esm"
        OutExtension:
          - .js=.mjs
        Target: "es2024"
        Sourcemap: true
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url); # Required in order to use AWS Lambda Powertools
        EntryPoints:
          - solutions/api/src/lambda/token/index.ts

  ApiJourneyOutcomeLambdaLogGroup:
    Type: AWS::Logs::LogGroup
