      - FrontendApiGatewayStage # This resource is created as part of the RestApi resource

  FrontendApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Description: Account Components Frontend API
      StageName: !Ref Environment
      AlwaysDeploy: true
      DisableExecuteApiEndpoint: true
      TracingEnabled: true
      EndpointConfiguration:
        Type: REGIONAL
      BinaryMediaTypes: !If
        - IsLocal
        - !Ref AWS::NoValue
        - - "*/*"
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "requestTimeEpoch": "$context.requestTimeEpoch",
          "httpMethod": "$context.httpMethod",
          "domainName": "$context.domainName",
          "path": "$context.path",
          "routeKey": "$context.routeKey",
          "protocol": "$context.protocol",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "authorizerLatency": "$context.authorizer.latency",
          "integrationStatus": "$context.integrationStatus",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message",
          "errorResponseType": "$context.error.responseType",
          "validationErrorString": "$context.error.validationErrorString",
          "xrayTraceId": "$context.xrayTraceId",
          "tlsVersion": "$context.tlsVersion",
          "cipherSuite": "$context.cipherSuite"    
          }
        DestinationArn: !GetAtt FrontendApiGatewayAccessLogGroup.Arn
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: /*
          HttpMethod: "*"
      Tags:
        FMSRegionalPolicy: false

  FrontendApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${FrontendApiGateway}/${Environment}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  FrontendLambda:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: solutions/frontend/dist
      Handler: lambda.handler
      DeploymentPreference:
        Alarms:
          - !Ref FrontendLambdaErrorsAlarm
          - !Ref FrontendLambdaThrottlesAlarm
      ProvisionedConcurrencyConfig:
        ProvisionedConcurrentExecutions: 1
      LoggingConfig:
        LogGroup: !Ref FrontendLambdaLogGroup
      Events:
        Root:
          Type: Api
          Properties:
            Method: ANY
            Path: /
            RestApiId: !Ref FrontendApiGateway
        CatchAll:
          Type: Api
          Properties:
            Method: ANY
            Path: /{proxy+}
            RestApiId: !Ref FrontendApiGateway
      Environment:
        Variables:
          SESSIONS_SIGNER: !Sub "{{resolve:secretsmanager:${SessionSecret}:SecretString}}"
          SESSIONS_TABLE_NAME: !Sub ${AWS::StackName}-SessionStore
          ROOT_DOMAIN:
            !FindInMap [EnvironmentConfiguration, !Ref Environment, rootDomain]
          NOTIFICATIONS_QUEUE_URL: !GetAtt NotificationsQueue.QueueUrl
          AUTH_CODE_TABLE_NAME: !Ref AuthCodeTable
          JOURNEY_OUTCOME_TABLE_NAME: !Ref JourneyOutcomeTable
          AUTHORIZE_ENDPOINT_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              authorizeEndpointUrl,
            ]
          AUDIT_EVENTS_QUEUE_URL: !GetAtt TxMASQSProducerAuditEventQueue.QueueUrl
          AUTH_FRONTEND_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              authFrontendUrl,
            ]
          ANALYTICS_COOKIE_DOMAIN:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              analyticsCookieDomain,
            ]
          GA4_CONTAINER_ID:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              ga4ContainerId,
            ]
          ACCOUNT_MANAGEMENT_API_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              accountManagementApiUrl,
            ]
          CONTACT_URL:
            !FindInMap [EnvironmentConfiguration, !Ref Environment, contactUrl]
          PASSKEYS_RP_ID:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              passkeysRpId,
            ]
          PASSKEYS_RP_NAME:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              passkeysRpName,
            ]
          PASSKEYS_EXPECTED_ORIGIN:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              passkeysExpectedOrigin,
            ]
          YOUR_SERVICES_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              yourServicesUrl,
            ]
          SECURITY_URL:
            !FindInMap [EnvironmentConfiguration, !Ref Environment, securityUrl]
          ANALYTICS_ENABLED:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              analyticsEnabled,
            ]
          DYNATRACE_RUM_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              dynatraceRumUrl,
            ]
          ACCOUNT_DATA_API_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              accountDataApiUrl,
            ]
          JAR_RSA_ENCRYPTION_KEY_ALIAS: !Ref JARRSAEncryptionKeyAlias
          REPLAY_ATTACK_TABLE_NAME: !Ref ReplayAttackTable
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:DescribeTable
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:GetItem
                - dynamodb:Scan
                - dynamodb:UpdateItem
              Resource: !GetAtt SessionsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !GetAtt AuthCodeTable.Arn
                - !GetAtt JourneyOutcomeTable.Arn
                - !GetAtt ReplayAttackTable.Arn
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !GetAtt DynamoDbSSEKey.Arn
            - Effect: Allow
              Action:
                - kms:DescribeKey
                - kms:Decrypt
              Resource: !GetAtt JARRSAEncryptionKey.Arn
            - Effect: Allow
              Action:
                - appconfig:GetLatestConfiguration
                - appconfig:StartConfigurationSession
              Resource: !Sub arn:aws:appconfig:${AWS::Region}:${AWS::AccountId}:application/*
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource:
                - !GetAtt NotificationsQueue.Arn
                - !GetAtt TxMASQSProducerAuditEventQueue.Arn
            - Effect: Allow
              Action:
                - kms:GenerateDataKey
              Resource: !GetAtt SqsKmsKey.Arn

  FrontendLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/FrontendLambda"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  FrontendApiGateway5XXErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/ApiGateway
      MetricName: 5XXError
      Dimensions:
        - Name: ApiName
          Value: !Ref FrontendApiGateway
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  FrontendApiGatewayHighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/ApiGateway
      MetricName: Latency
      Dimensions:
        - Name: ApiName
          Value: !Ref FrontendApiGateway
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  FrontendLambdaErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/FrontendLambda"
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrontendLambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  FrontendLambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/FrontendLambda"
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrontendLambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  FrontendLambdaLogWarnByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '{ $.level = "WARN" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: WarnLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: scope
              Value: $.scope
            - Key: client_id
              Value: $.client_id
            - Key: path
              Value: $.path

  FrontendLambdaLogErrorByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '{ $.level = "ERROR" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: ErrorLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: scope
              Value: $.scope
            - Key: client_id
              Value: $.client_id
            - Key: path
              Value: $.path

  FrontendLambdaLogCriticalByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '{ $.level = "CRITICAL" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: CriticalLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: scope
              Value: $.scope
            - Key: client_id
              Value: $.client_id
            - Key: path
              Value: $.path

  FrontendLambdaLogErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '{ $.level = "ERROR" || $.level = "CRITICAL" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: ErrorAndCriticalLogCount
          MetricValue: "1"
          DefaultValue: 0

  FrontendLambdaLogErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/FrontendLambda"
      MetricName: ErrorAndCriticalLogCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  FrontendLambdaColdStartCountMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '[report_label="REPORT", ..., init_duration_label="Init", duration_label="Duration:", init_duration_value, init_duration_unit="ms"]'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: ColdStartCount
          MetricValue: "1"
          DefaultValue: 0

  FrontendLambdaColdStartDurationMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FrontendLambdaLogGroup
      FilterPattern: '[report_label="REPORT", ..., init_duration_label="Init", duration_label="Duration:", init_duration_value, init_duration_unit="ms"]'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/FrontendLambda"
          MetricName: ColdStartDuration
          MetricValue: $init_duration_value
          DefaultValue: 0
          Unit: Milliseconds

  FrontendLambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/FrontendLambda"
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref FrontendLambda
      ExtendedStatistic: p90
      Period: 60
      EvaluationPeriods: 15
      DatapointsToAlarm: 15
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  StubsMockClientECPrivateKeySSM:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Description: A mock client EC private key
      Name: !Sub /${AWS::StackName}/MockClientEcPrivateKey
      Type: String
      Value: "set-me"
      Tags:
        Environment: !Ref Environment

  StubsMockClientECPublicKeySSM:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Description: A mock client EC public key
      Name: !Sub /${AWS::StackName}/MockClientEcPublicKey
      Type: String
      Value: "set-me"
      Tags:
        Environment: !Ref Environment

  StubsMockClientRSAPrivateKeySSM:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Description: A mock client RSA private key
      Name: !Sub /${AWS::StackName}/MockClientRsaPrivateKey
      Type: String
      Value: "set-me"
      Tags:
        Environment: !Ref Environment

  StubsMockClientRSAPublicKeySSM:
    Type: AWS::SSM::Parameter
    Condition: IsDevOrBuild
    Properties:
      Description: A mock client RSA public key
      Name: !Sub /${AWS::StackName}/MockClientRsaPublicKey
      Type: String
      Value: "set-me"
      Tags:
        Environment: !Ref Environment

  StubsApiDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: IsDevOrBuild
    Properties:
      DomainName:
        !FindInMap [EnvironmentConfiguration, !Ref Environment, stubsDomain]
      RegionalCertificateArn:
        Fn::ImportValue: certificate-CertificateARN
      EndpointConfiguration:
        Types:
          - REGIONAL
      SecurityPolicy: SecurityPolicy_TLS13_1_2_FIPS_PQ_2025_09
      EndpointAccessMode: STRICT

  StubsRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsDevOrBuild
    Properties:
      Name: !Ref StubsApiDomain
      Type: A
      HostedZoneId:
        Fn::ImportValue: hosted-zone-HostedZoneID
      AliasTarget:
        DNSName: !GetAtt StubsApiDomain.RegionalDomainName
        HostedZoneId: !GetAtt StubsApiDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false

  StubsApiMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: IsDevOrBuild
    Properties:
      DomainName: !Ref StubsApiDomain
      RestApiId: !Ref StubsApiGateway
      Stage: !Ref Environment
    DependsOn:
      - StubsApiGatewayStage # This resource is created as part of the RestApi resource

  StubsApiGateway:
    Type: AWS::Serverless::Api
    Condition: IsDevOrBuild
    Properties:
      Description: Account Components Stub API
      StageName: !Ref Environment
      AlwaysDeploy: true
      DisableExecuteApiEndpoint: true
      TracingEnabled: true
      EndpointConfiguration:
        Type: REGIONAL
      BinaryMediaTypes: !If
        - IsLocal
        - !Ref AWS::NoValue
        - - "*/*"
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "requestTimeEpoch": "$context.requestTimeEpoch",
          "httpMethod": "$context.httpMethod",
          "domainName": "$context.domainName",
          "path": "$context.path",
          "routeKey": "$context.routeKey",
          "protocol": "$context.protocol",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "authorizerLatency": "$context.authorizer.latency",
          "integrationStatus": "$context.integrationStatus",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message",
          "errorResponseType": "$context.error.responseType",
          "validationErrorString": "$context.error.validationErrorString",
          "xrayTraceId": "$context.xrayTraceId",
          "tlsVersion": "$context.tlsVersion",
          "cipherSuite": "$context.cipherSuite"
          }
        DestinationArn: !GetAtt StubsApiGatewayAccessLogGroup.Arn
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: /*
          HttpMethod: "*"
      Tags:
        FMSRegionalPolicy: false
        CustomPolicy: mock

  StubsApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsDevOrBuild
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${StubsApiGateway}/${Environment}"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  StubsLambda:
    Type: AWS::Serverless::Function
    Condition: IsDevOrBuild
    Metadata:
      BuildMethod: makefile
    Properties:
      CodeUri: solutions/stubs/dist
      Handler: lambda.handler
      LoggingConfig:
        LogGroup: !Ref StubsLambdaLogGroup
      Events:
        Root:
          Type: Api
          Properties:
            Method: ANY
            Path: /
            RestApiId: !Ref StubsApiGateway
        CatchAll:
          Type: Api
          Properties:
            Method: ANY
            Path: /{proxy+}
            RestApiId: !Ref StubsApiGateway
      Environment:
        Variables:
          MOCK_CLIENT_EC_PRIVATE_KEY_SSM_NAME: !Sub "/${AWS::StackName}/MockClientEcPrivateKey"
          MOCK_CLIENT_EC_PUBLIC_KEY_SSM_NAME: !Sub "/${AWS::StackName}/MockClientEcPublicKey"
          MOCK_CLIENT_RSA_PRIVATE_KEY_SSM_NAME: !Sub "/${AWS::StackName}/MockClientRsaPrivateKey"
          MOCK_CLIENT_RSA_PUBLIC_KEY_SSM_NAME: !Sub "/${AWS::StackName}/MockClientRsaPublicKey"
          JAR_RSA_ENCRYPTION_KEY_ALIAS: !Ref JARRSAEncryptionKeyAlias
          DEFAULT_AUDIENCE: !Sub "https://manage.${Environment}.account.gov.uk/authorize"
          ACCESS_TOKEN_ISSUER: !Sub "https://stubs.manage.${Environment}.account.gov.uk"
          AUTHORIZE_URL: !Sub "https://manage.${Environment}.account.gov.uk/authorize"
          API_BASE_URL: !Sub "https://${ApiApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
          ROOT_DOMAIN:
            !FindInMap [EnvironmentConfiguration, !Ref Environment, rootDomain]
          NOTIFY_TEMPLATE_IDS:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              notifyTemplateIds,
            ]
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource:
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/MockClientEcPublicKey
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/MockClientEcPrivateKey
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/MockClientRsaPublicKey
                - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/MockClientRsaPrivateKey
            - Effect: Allow
              Action:
                - appconfig:GetLatestConfiguration
                - appconfig:StartConfigurationSession
              Resource: !Sub arn:aws:appconfig:${AWS::Region}:${AWS::AccountId}:application/*
            - Effect: Allow
              Action:
                - kms:DescribeKey
                - kms:GetPublicKey
              Resource: !GetAtt JARRSAEncryptionKey.Arn

  StubsLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsDevOrBuild
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/StubsLambda"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn
