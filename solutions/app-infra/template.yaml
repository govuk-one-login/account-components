Conditions:
  UseCodeSigning:
    Fn::Not:
      - Fn::Equals:
          - !Ref CodeSigningConfigArn
          - "none"
  UsePermissionsBoundary:
    Fn::Not:
      - Fn::Equals:
          - !Ref PermissionsBoundary
          - "none"
  IsLocal:
    Fn::Equals:
      - !Ref "AWS::Region"
      - "local"
  CanariesEnabled: !Equals
    - !FindInMap [EnvironmentConfiguration, !Ref Environment, UseCanary]
    - true
  IsDevEnvironment: !Equals [!Ref Environment, "dev"]
  IsBuildEnvironment: !Equals [!Ref Environment, "build"]
  IsDevOrBuild: !Or [Condition: IsDevEnvironment, Condition: IsBuildEnvironment]
  IsLocalOrDev: !Or [Condition: IsDevEnvironment, Condition: IsLocal]
  HasTxmaAccountArn: !Not
    - !Equals
      - !FindInMap [EnvironmentConfiguration, !Ref Environment, txmaAccountArn]
      - ""

Globals:
  Function:
    DeploymentPreference:
      Type: !If
        - CanariesEnabled
        - !Ref LambdaDeploymentPreference
        - AllAtOnce
      Alarms: []
      Role: !GetAtt CodeDeployServiceRole.Arn
    Tracing: Active
    AutoPublishAlias: live
    KmsKeyArn: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn
    Layers:
      - !If [
          IsLocal,
          !Ref AWS::NoValue,
          "arn:aws:lambda:eu-west-2:216552277552:layer:Dynatrace_OneAgent_1_313_2_20250404-043044_with_collector_nodejs:1",
        ]
    CodeSigningConfigArn: !If
      - UseCodeSigning
      - !Ref CodeSigningConfigArn
      - !Ref AWS::NoValue
    PermissionsBoundary: !If
      - UsePermissionsBoundary
      - !Ref PermissionsBoundary
      - !Ref AWS::NoValue
    VpcConfig:
      SubnetIds: !If
        - IsDevOrBuild
        - - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdA
          - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdB
          - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdC
        - - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdA
          - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdB
          - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdC
      SecurityGroupIds:
        - Fn::ImportValue: !Sub ${VpcStackName}-AWSServicesEndpointSecurityGroupId
    Timeout: 10
    MemorySize: 1769 # so that we get ~1 VCPU
    Architectures:
      - !Ref LambdaArchitecture
    Runtime: nodejs24.x
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL:
          !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            LambdaLogLevel,
          ]
        POWERTOOLS_SERVICE_NAME: !Ref AWS::StackName
        POWERTOOLS_PARAMETERS_MAX_AGE: 300
        AWS_XRAY_CONTEXT_MISSING: IGNORE_ERROR
        NODE_OPTIONS:
          !If [IsLocalOrDev, "--enable-source-maps", !Ref AWS::NoValue]
        USE_LOCALSTACK: !Ref AWS::NoValue
        ENVIRONMENT: !Ref Environment
        NODE_ENV: "production"
        LOCALSTACK_ENDPOINT: !Ref AWS::NoValue
        LOCALSTACK_ACCESS_KEY_ID: !Ref AWS::NoValue
        LOCALSTACK_ACCESS_KEY: !Ref AWS::NoValue
        LOCAL_KMS_ENDPOINT: !Ref AWS::NoValue
        AWS_LAMBDA_EXEC_WRAPPER:
          !If [IsLocal, !Ref AWS::NoValue, "/opt/dynatrace"]
        DT_CONNECTION_AUTH_TOKEN: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_AUTH_TOKEN}}" # pragma: allowlist-secret
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_CONNECTION_BASE_URL: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CONNECTION_BASE_URL}}" # pragma: allowlist-secret
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_CLUSTER_ID: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_CLUSTER_ID}}" # pragma: allowlist-secret
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_LOG_COLLECTION_AUTH_TOKEN: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_LOG_COLLECTION_AUTH_TOKEN}}" # pragma: allowlist-secret
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_TENANT: !Sub
          - "{{resolve:secretsmanager:${SecretArn}:SecretString:DT_TENANT}}" # pragma: allowlist-secret
          - SecretArn:
              !FindInMap [
                EnvironmentConfiguration,
                !Ref Environment,
                dynatraceSecretArn,
              ]
        DT_LOGGING_NODEJS_FLAGS: Exporter=true,LambdaSensor=false
        DT_OPEN_TELEMETRY_ENABLE_INTEGRATION: true
        DT_OPEN_TELEMETRY_ALLOW_EXPLICIT_PARENT: true

Resources:
  CodeDeployServiceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Action:
              - sts:AssumeRole
            Effect: Allow
            Principal:
              Service:
                - codedeploy.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSCodeDeployRoleForLambda
      PermissionsBoundary:
        !If [
          UsePermissionsBoundary,
          !Ref PermissionsBoundary,
          !Ref AWS::NoValue,
        ]

  DynamoDbSSEKey:
    Type: AWS::KMS::Key
    Properties:
      Description: AWS KMS key for encrypting the data stored within DynamoDB tables
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "kms:*"
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: "dynamodb.amazonaws.com"
            Action:
              - "kms:Encrypt"
              - "kms:Decrypt"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:DescribeKey"
              - "kms:CreateGrant"
            Resource: "*"
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/*"
          - Effect: Allow
            Principal:
              Service: "lambda.amazonaws.com"
            Action:
              - "kms:Decrypt"
              - "kms:GenerateDataKey"
            Resource: "*"
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-DynamoDbSSEKey"

  DynamoDbSSEKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-DynamoDbSSEKey"
      TargetKeyId: !GetAtt DynamoDbSSEKey.Arn

  CloudWatchEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: AWS KMS key for encrypting CloudWatch logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - "kms:Encrypt*"
              - "kms:Decrypt*"
              - "kms:ReEncrypt*"
              - "kms:GenerateDataKey*"
              - "kms:Describe*"
            Resource: "*"
            Condition:
              ArnLike:
                "kms:EncryptionContext:aws:logs:arn": !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-CloudWatchEncryptionKey"

  CloudWatchEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-CloudWatchEncryptionKey"
      TargetKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  LambdaEnvironmentVariableEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "KMS key used to encrypt lambda environment variables"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: "Allow"
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:Decrypt"
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn": !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey"

  LambdaEnvironmentVariableEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-LambdaEnvironmentVariableEncryptionKey"
      TargetKeyId: !GetAtt LambdaEnvironmentVariableEncryptionKey.Arn

  JARRSAEncryptionKey:
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Type: AWS::KMS::Key
    Properties:
      Description: "RSA KMS key pair used to encrypt and decrypt JARs"
      KeySpec: RSA_2048
      KeyUsage: ENCRYPT_DECRYPT
      Origin: AWS_KMS
      Enabled: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: "Allow"
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:Decrypt"
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn":
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-AuthorizeLambda*"
          - Effect: "Allow"
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:ListAliases"
              - "kms:GetPublicKey"
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn":
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-StubsLambda*"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-JARRSAEncryptionKey"

  JARRSAEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-JARRSAEncryptionKey"
      TargetKeyId: !GetAtt JARRSAEncryptionKey.Arn

  JWTSigningKey:
    Type: AWS::KMS::Key
    Properties:
      Description: "JWT Signing Key"
      KeySpec: ECC_NIST_P256
      KeyUsage: SIGN_VERIFY
      Origin: AWS_KMS
      Enabled: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: "Allow"
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - "kms:Sign"
              - "kms:Verify"
              - "kms:DescribeKey"
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn":
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-JWTSigningKey"

  JWTSigningKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-JWTSigningKey"
      TargetKeyId: !GetAtt JWTSigningKey.Arn

  S3SSEKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting JWKSStore bucket
      KeyUsage: ENCRYPT_DECRYPT
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:*
            Resource: "*"
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringEquals:
                kms:ViaService: !Sub "s3.${AWS::Region}.amazonaws.com"
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - kms:GenerateDataKey
            Resource: "*"
            Condition:
              ArnLike:
                "aws:SourceArn":
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}*"

  S3SSEKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-S3SSEKey"
      TargetKeyId: !GetAtt S3SSEKey.Arn

  JWKSStoreBucket:
    Type: AWS::S3::Bucket
    DependsOn: AccessLogsBucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${Environment}-jwks-store"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !Sub "${AWS::StackName}-${Environment}-access-logs"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref S3SSEKey

  JWKSStoreBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref JWKSStoreBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:aws:s3:::${JWKSStoreBucket}"
              - !Sub "arn:aws:s3:::${JWKSStoreBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
              NumericLessThan:
                s3:TlsVersion: "1.2"
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Resource: !Sub "arn:aws:s3:::${JWKSStoreBucket}/*"
            Action:
              - s3:PutObject
          - Effect: Allow
            Resource: !Sub "arn:aws:s3:::${JWKSStoreBucket}/*"
            Principal:
              Service: apigateway.amazonaws.com
            Action:
              - s3:GetObject

  AccessLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-${Environment}-access-logs"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !Ref S3SSEKey

  AccessLogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AccessLogsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: EnforceHTTPSOnly
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "${AccessLogsBucket.Arn}"
              - !Sub "${AccessLogsBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
              NumericLessThan:
                s3:TlsVersion: "1.2"
          - Sid: AllowS3LoggingService
            Effect: Allow
            Principal:
              Service: "logging.s3.amazonaws.com"
            Action: "s3:PutObject"
            Resource: !Sub "${AccessLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*"
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId

  JwksGeneratorLambda:
    Type: AWS::Serverless::Function
    Properties:
      Description: "Creates a JWKS doc and stores it into a S3 Bucket"
      Timeout: 15
      MemorySize: 128
      Handler: jwks-creator.handler
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdA
          - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdB
          - Fn::ImportValue: !Sub ${VpcStackName}-PrivateSubnetIdC
      DeploymentPreference:
        Enabled: false
      LoggingConfig:
        LogGroup: !Ref JwksGeneratorLambdaLogGroup
      Environment:
        Variables:
          BUCKET_NAME: !Ref JWKSStoreBucket
          JAR_RSA_ENCRYPTION_KEY_ALIAS: !Ref JARRSAEncryptionKeyAlias
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - kms:GetPublicKey
                - kms:DescribeKey
              Resource: !GetAtt JARRSAEncryptionKey.Arn
            - Effect: Allow
              Action:
                - kms:GenerateDataKey
              Resource: !GetAtt S3SSEKey.Arn
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource: !Sub "${JWKSStoreBucket.Arn}/*"
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: !GetAtt JwksGeneratorLambdaLogGroup.Arn
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: es2024
        Sourcemap: true
        EntryPoints:
          - solutions/core/src/lambda/jwks-creator.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url); # Required in order to use AWS Lambda Powertools

  JwksGeneratorLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/JwksGeneratorLambda"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  JwksGeneratorLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref JwksGeneratorLambda
      Action: lambda:InvokeFunction
      Principal: cloudformation.amazonaws.com

  JwksGeneratorTrigger:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt JwksGeneratorLambda.Arn
      ForceUpdate: !Ref JwksGeneratorLambda

  AuthCodeTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-AuthCode
      AttributeDefinitions:
        - AttributeName: "code"
          AttributeType: "S"
      KeySchema:
        - AttributeName: "code"
          KeyType: "HASH"
      BillingMode: PAY_PER_REQUEST
      ContributorInsightsSpecification:
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      TimeToLiveSpecification:
        AttributeName: "expires"
        Enabled: true
      SSESpecification:
        KMSMasterKeyId: !GetAtt DynamoDbSSEKey.Arn
        SSEEnabled: true
        SSEType: KMS
      TableClass: STANDARD
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-auth_code"

  JourneyOutcomeTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-JourneyOutcome
      AttributeDefinitions:
        - AttributeName: outcome_id
          AttributeType: S
      KeySchema:
        - AttributeName: outcome_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      ContributorInsightsSpecification:
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      TimeToLiveSpecification:
        AttributeName: "expires"
        Enabled: true
      SSESpecification:
        KMSMasterKeyId: !GetAtt DynamoDbSSEKey.Arn
        SSEEnabled: true
        SSEType: KMS
      TableClass: STANDARD
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-journey_outcome"

  ReplayAttackTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub ${AWS::StackName}-ReplayAttack
      AttributeDefinitions:
        - AttributeName: nonce
          AttributeType: S
      KeySchema:
        - AttributeName: nonce
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires
        Enabled: true
      BillingMode: PAY_PER_REQUEST
      ContributorInsightsSpecification:
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: false
      SSESpecification:
        KMSMasterKeyId: !GetAtt DynamoDbSSEKey.Arn
        SSEEnabled: true
        SSEType: KMS
      TableClass: STANDARD
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-replay_attack"

  SecretsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  SecretsKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-SecretsKmsKey"
      TargetKeyId: !GetAtt SecretsKmsKey.Arn

  NotifyAPIKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      KmsKeyId: !Ref SecretsKmsKey
      SecretString: set-me # pragma: allowlist secret

  SqsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::${AWS::AccountId}:root
            Action: kms:*
            Resource:
              - "*"

  SqsKmsKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${AWS::StackName}-SqsKmsKey"
      TargetKeyId: !Ref SqsKmsKey

  NotificationsQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      VisibilityTimeout:
        !FindInMap [
          EnvironmentConfiguration,
          !Ref Environment,
          notificationsVisibilityTimeout,
        ]
      KmsMasterKeyId: !GetAtt SqsKmsKey.Arn
      RedriveAllowPolicy:
        redrivePermission: denyAll
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationsDLQ.Arn
        maxReceiveCount:
          !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            notificationsMaxReceiveCount,
          ]

  NotificationsDLQ:
    Type: AWS::SQS::Queue
    Properties:
      KmsMasterKeyId: !GetAtt SqsKmsKey.Arn
      MessageRetentionPeriod: 1209600

  NotificationsServiceLambda:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 15
      MemorySize: 128
      LoggingConfig:
        LogGroup: !Ref NotificationsServiceLambdaLogGroup
      Events:
        NotificationsQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt NotificationsQueue.Arn
            BatchSize: 10
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Handler: notifications-service.handler
      Runtime: nodejs22.x # as at 2026-02-03 the notifications-node-client library does not work with Node 24 or newer
      VpcConfig:
        SubnetIds:
          - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdA
          - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdB
          - Fn::ImportValue: !Sub ${VpcStackName}-ProtectedSubnetIdC
      Environment:
        Variables:
          NOTIFY_API_KEY_SECRET_ARN: !Ref NotifyAPIKeySecret
          NOTIFY_TEMPLATE_IDS:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              notifyTemplateIds,
            ]
          NOTIFY_STUB_URL:
            !FindInMap [
              EnvironmentConfiguration,
              !Ref Environment,
              notifyStubUrl,
            ]
      DeploymentPreference:
        Alarms: !If
          - IsDevEnvironment
          - []
          - - !Ref NotificationsServiceFunctionSuccessRate
      Policies:
        - arn:aws:iam::aws:policy/AWSXrayWriteOnlyAccess
        - Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !GetAtt NotificationsQueue.Arn
            - Effect: Allow
              Action:
                - kms:Decrypt
              Resource: !GetAtt SqsKmsKey.Arn
            - Effect: Allow
              Action:
                - "kms:Decrypt"
              Resource:
                - !GetAtt SecretsKmsKey.Arn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue # pragma: allowlist secret
              Resource: !Ref NotifyAPIKeySecret
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Format: esm
        OutExtension:
          - .js=.mjs
        Target: es2022 # as at 2026-02-03 the notifications-node-client library does not work with Node 24 or newer
        Sourcemap: true
        EntryPoints:
          - solutions/core/src/lambda/notifications-service.ts
        Banner:
          - js=import { createRequire } from 'module'; const require = createRequire(import.meta.url); # Required in order to use AWS Lambda Powertools

  NotificationsServiceLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AWS::StackName}/NotificationsService"
      RetentionInDays: 30
      KmsKeyId: !GetAtt CloudWatchEncryptionKey.Arn

  NotificationsServiceLambdaThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref NotificationsServiceLambda
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  NotificationsServiceLambdaLogErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref NotificationsServiceLambdaLogGroup
      FilterPattern: '{ $.level = "ERROR" || $.level = "CRITICAL" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
          MetricName: ErrorAndCriticalLogCount
          MetricValue: "1"
          DefaultValue: 0

  NotificationsServiceLambdaLogErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
      MetricName: ErrorAndCriticalLogCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  NotificationsServiceLambdaLogWarnByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref NotificationsServiceLambdaLogGroup
      FilterPattern: '{ $.level = "WARN" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
          MetricName: WarnLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: notificationType
              Value: $.notificationType

  NotificationsServiceLambdaLogErrorByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref NotificationsServiceLambdaLogGroup
      FilterPattern: '{ $.level = "ERROR" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
          MetricName: ErrorLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: notificationType
              Value: $.notificationType

  NotificationsServiceLambdaLogCriticalByContextMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref NotificationsServiceLambdaLogGroup
      FilterPattern: '{ $.level = "CRITICAL" }'
      MetricTransformations:
        - MetricNamespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
          MetricName: CriticalLogCountByContext
          MetricValue: "1"
          Dimensions:
            - Key: notificationType
              Value: $.notificationType

  NotificationsServiceFunctionSuccessRate:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Metrics:
        - Id: errors
          MetricStat:
            Metric:
              Namespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
              MetricName: Errors
              Dimensions:
                - Name: FunctionName
                  Value: !Ref NotificationsServiceLambda
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: invocations
          MetricStat:
            Metric:
              Namespace: !Sub "${AWS::StackName}/NotificationsServiceLambda"
              MetricName: Invocations
              Dimensions:
                - Name: FunctionName
                  Value: !Ref NotificationsServiceLambda
            Period: 300
            Stat: Sum
          ReturnData: false
        - Id: successRate
          Expression: "1 - (errors / invocations)"
          Label: "Success Rate"
          ReturnData: true
      Threshold: 0.95
      ComparisonOperator: LessThanThreshold
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn

  NotificationsQueueProcessingTooSlow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn
      ComparisonOperator: GreaterThanThreshold
      Threshold: 600
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt NotificationsQueue.QueueName
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Period: 60
      Statistic: Maximum

  NotificationsDLQHasMessages:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn
      ComparisonOperator: GreaterThanThreshold
      Threshold: 0
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt NotificationsDLQ.QueueName
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Period: 60
      Statistic: Maximum

  TxMASQSProducerAuditEventQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: !If [IsDevOrBuild, 3600, 1209600]
      KmsMasterKeyId: !Ref TxMASQSProducerAuditEventQueueEncryptionKeyAlias
      RedriveAllowPolicy:
        redrivePermission: denyAll
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt TxMAAuditEventDeadLetterQueue.Arn
        maxReceiveCount: 10
      Tags:
        - Key: "AuthoredBy"
          Value: "TxMA"
        - Key: "ProducerType"
          Value: "SQS"
        - Key: "QueueType"
          Value: "Main"

  TxMASQSProducerAuditEventQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref TxMASQSProducerAuditEventQueue
      PolicyDocument:
        Statement:
          - Sid: "AllowReadByTxMAAccount"
            Effect: Allow
            Principal:
              AWS: !If
                - HasTxmaAccountArn
                - !FindInMap [
                    EnvironmentConfiguration,
                    !Ref Environment,
                    txmaAccountArn,
                  ]
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "sqs:ChangeMessageVisibility"
              - "sqs:ReceiveMessage"
              - "sqs:DeleteMessage"
              - "sqs:GetQueueAttributes"
            Resource: !GetAtt TxMASQSProducerAuditEventQueue.Arn

  TxMAAuditEventDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: !Ref TxMASQSProducerAuditEventQueueEncryptionKeyAlias
      Tags:
        - Key: "AuthoredBy"
          Value: "TxMA"
        - Key: "ProducerType"
          Value: "SQS"
        - Key: "QueueType"
          Value: "DLQ"

  TxMASQSProducerAuditEventQueueEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: Symmetric key used to encrypt TxMA audit messages at rest in SQS
      EnableKeyRotation: true
      KeySpec: SYMMETRIC_DEFAULT
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: "Enable root account access"
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "kms:*"
            Resource: "*"
          - Sid: "Allow decryption of events by TxMA"
            Effect: Allow
            Principal:
              AWS: !If
                - HasTxmaAccountArn
                - !FindInMap [
                    EnvironmentConfiguration,
                    !Ref Environment,
                    txmaAccountArn,
                  ]
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - "kms:decrypt"
            Resource: "*"
      Tags:
        - Key: "AuthoredBy"
          Value: "TxMA"
        - Key: "ProducerType"
          Value: "SQS"

  TxMASQSProducerAuditEventQueueEncryptionKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub alias/${AWS::StackName}/AuditEventEncryptionKey
      TargetKeyId: !Ref TxMASQSProducerAuditEventQueueEncryptionKey

  TxMASQSProducerAuditEventQueueProcessingTooSlow:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn
      ComparisonOperator: GreaterThanThreshold
      Threshold: 86400
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt TxMASQSProducerAuditEventQueue.QueueName
      MetricName: ApproximateAgeOfOldestMessage
      Namespace: AWS/SQS
      Period: 300
      Statistic: Maximum

  TxMAAuditEventDeadLetterQueueHasMessages:
    Type: AWS::CloudWatch::Alarm
    Properties:
      ActionsEnabled: true
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-WarningAlertsTopicArn
      ComparisonOperator: GreaterThanThreshold
      Threshold: 0
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Dimensions:
        - Name: QueueName
          Value: !GetAtt TxMAAuditEventDeadLetterQueue.QueueName
      MetricName: ApproximateNumberOfMessagesVisible
      Namespace: AWS/SQS
      Period: 300
      Statistic: Maximum

  LambdaClaimedAccountConcurrencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      Namespace: AWS/Lambda
      MetricName: ClaimedAccountConcurrency
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 10
      DatapointsToAlarm: 10
      Threshold: 900
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - Fn::ImportValue: !Sub ${AlertsStackName}-CriticalAlertsTopicArn

  ApiApiGatewayS3Role:
    Type: AWS::IAM::Role
    Properties:
      PermissionsBoundary: !If
        - UsePermissionsBoundary
        - !Ref PermissionsBoundary
        - !Ref AWS::NoValue
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub
                  - "arn:aws:s3:::${BucketName}/jwks.json"
                  - BucketName: !Ref JWKSStoreBucket
              - Effect: Allow
                Action: kms:Decrypt
                Resource: !GetAtt S3SSEKey.Arn

  ApiApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Description: Account Components API
      StageName: !Ref ApiStageName
      AlwaysDeploy: true
      DisableExecuteApiEndpoint: false
      TracingEnabled: true
      EndpointConfiguration:
        Type: PRIVATE
        VpcEndpointIds:
          - Fn::ImportValue: !Sub "${VpcStackName}-ExecuteApiGatewayEndpointId"
      AccessLogSetting:
        Format: >-
          {
          "requestId": "$context.requestId",
          "requestTime": "$context.requestTime",
          "requestTimeEpoch": "$context.requestTimeEpoch",
          "httpMethod": "$context.httpMethod",
          "domainName": "$context.domainName",
          "path": "$context.path",
          "routeKey": "$context.routeKey",
          "protocol": "$context.protocol",
          "status": "$context.status",
          "responseLength": "$context.responseLength",
          "responseLatency": "$context.responseLatency",
          "authorizerLatency": "$context.authorizer.latency",
          "integrationStatus": "$context.integrationStatus",
          "integrationLatency": "$context.integrationLatency",
          "integrationErrorMessage": "$context.integrationErrorMessage",
          "errorMessage": "$context.error.message",
          "errorResponseType": "$context.error.responseType",
          "validationErrorString": "$context.error.validationErrorString",
          "xrayTraceId": "$context.xrayTraceId",
          "tlsVersion": "$context.tlsVersion",
          "cipherSuite": "$context.cipherSuite"
          }
        DestinationArn: !GetAtt ApiApiGatewayAccessLogGroup.Arn
      MethodSettings:
        - MetricsEnabled: true
          ResourcePath: /*
          HttpMethod: "*"
      Policy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "*"
            Condition:
              StringEquals:
                aws:sourceVpce: !If
                  - IsDevOrBuild
                  - - Fn::ImportValue: !Sub "${VpcStackName}-ExecuteApiGatewayEndpointId"
                  - !FindInMap
                    - EnvironmentConfiguration
                    - !Ref Environment
                    - apiAllowedVpceIds
      Variables:
        ApiDomain: !Sub "https://${ApiApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${ApiStageName}"
        AuthorizeEndpointUrl:
          !FindInMap [
            EnvironmentConfiguration,
            !Ref Environment,
            authorizeEndpointUrl,
          ]
        IssuerUrl:
          !FindInMap [EnvironmentConfiguration, !Ref Environment, issuerUrl]
      DefinitionBody:
        openapi: 3.0.3
        info:
          title: Account Components API
          version: 1.0.0
        paths:
          /healthcheck:
            get:
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHealthcheckLambda.Alias}/invocations"
          /token:
            post:
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiTokenLambda.Alias}/invocations"
          /journeyoutcome:
            get:
              x-amazon-apigateway-integration:
                type: aws_proxy
                httpMethod: POST
                uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiJourneyOutcomeLambda.Alias}/invocations"
          /.well-known/jwks.json:
            get:
              responses:
                "200":
                  description: JWKS response
                  headers:
                    Content-Type:
                      schema:
                        type: string
                        example: "application/json"
                    Cache-Control:
                      schema:
                        type: string
                        example: "max-age=60"
              x-amazon-apigateway-integration:
                type: aws
                httpMethod: GET
                uri: !Sub
                  - "arn:aws:apigateway:${AWS::Region}:s3:path/${BucketName}/jwks.json"
                  - BucketName: !Ref JWKSStoreBucket
                credentials: !GetAtt ApiApiGatewayS3Role.Arn
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Content-Type: "'application/json'"
                      method.response.header.Cache-Control: !Sub
                        - "'max-age=${headerMaxAge}'"
                        - headerMaxAge:
                            !FindInMap [
                              EnvironmentConfiguration,
                              !Ref Environment,
                              cacheHeaderMaxAge,
                            ]
          /.well-known/oauth-authorization-server:
            get:
              responses:
                "200":
                  description: OAuth Discovery
                  headers:
                    Content-Type:
                      schema:
                        type: string
                        example: "application/json"
                    Cache-Control:
                      schema:
                        type: string
                        example: "max-age=60"
              x-amazon-apigateway-integration:
                responses:
                  default:
                    statusCode: 200
                    responseParameters:
                      method.response.header.Content-Type: "'application/json'"
                      method.response.header.Cache-Control: !Sub
                        - "'max-age=${headerMaxAge}'"
                        - headerMaxAge:
                            !FindInMap [
                              EnvironmentConfiguration,
                              !Ref Environment,
                              cacheHeaderMaxAge,
                            ]
                    responseTemplates:
                      application/json: !Sub >-
                        {
                            "issuer": "$stageVariables.IssuerUrl",
                            "authorization_endpoint": "$stageVariables.AuthorizeEndpointUrl",
                            "token_endpoint": "$stageVariables.ApiDomain/token",
                            "jwks_uri": "$stageVariables.ApiDomain/.well-known/jwks.json",
                            "response_types_supported": ["code"],
                            "token_endpoint_auth_methods_supported": ["private_key_jwt"],
                            "token_endpoint_auth_signing_alg_values_supported": ["ES256"],
                            "scopes_supported": ["testing-journey", "account-delete", "passkey-create"],
                            "grant_types_supported": ["authorization_code"]
                        }
                passthroughBehavior: when_no_match
                requestTemplates:
                  application/json: '{"statusCode": 200}'
                type: mock

