name: Deploy core

permissions: {}

on:
  push:
    branches:
      - main
    paths:
      - solutions/core/**
      - solutions/commons/**
      - .github/workflows/deploy-core.yaml
      - package.json
      - package-lock.json
      - .npmrc
      - .nvmrc
      - tsconfig.json

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  deploy-core:
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@f84ec7d548307efafe33230528756de3c5841a17
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Assume AWS role
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: ${{ secrets.GH_ACTIONS_ROLE_ARN_CORE }}
          aws-region: "eu-west-2"

      - name: Install dependencies
        run: npm run install-all

      - name: Build core
        run: npm run build:core

      - name: Deploy core
        uses: govuk-one-login/devplatform-upload-action@b7bc01ed6e0b61d54f42e7f3d12dd3fdbb0f172a
        with:
          artifact-bucket-name: ${{ secrets.ARTIFACT_BUCKET_NAME_CORE }}
          signing-profile-name: ${{ secrets.SIGNING_PROFILE_NAME }}
          working-directory: ./solutions/core
          template-file: .aws-sam/build/template.yaml
