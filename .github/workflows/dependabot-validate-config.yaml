name: Validate Dependabot config

on:
  pull_request:
    paths:
      - ".github/dependabot.yaml"
      - ".github/workflows/dependabot-validate-config.yaml"

jobs:
  validate:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: marocchino/validate-dependabot@d8ae5c0d03dd75fbd0ad5f8ab4ba8101ebbd4b37
